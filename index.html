<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zeiterfassung Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zeiten">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0ea5e9;       
            --primary-hover: #0284c7;
            --primary-light: #e0f2fe;
            --bg-color: #f1f5f9;      
            --card-bg: #ffffff;       
            --text-main: #0f172a;     
            --text-muted: #64748b;    
            --border: #e2e8f0;        
            --danger: #ef4444;
            --danger-bg: #fee2e2;
            --success: #10b981;
            --input-bg: #f8fafc;
            --pill-bg: #f1f5f9;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --modal-overlay: rgba(15, 23, 42, 0.4);
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-float: 0 10px 25px -5px rgba(14, 165, 233, 0.4);
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        [data-theme="dark"] {
            --bg-color: #020617;      
            --card-bg: #0f172a;       
            --text-main: #f8fafc;     
            --text-muted: #94a3b8;    
            --border: #1e293b;        
            --danger-bg: rgba(239, 68, 68, 0.1);
            --input-bg: #020617;
            --pill-bg: #1e293b;
            --glass-bg: rgba(2, 6, 23, 0.85);
            --modal-overlay: rgba(0, 0, 0, 0.7);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; margin: 0; background-color: var(--bg-color); color: var(--text-main); transition: 0.4s; padding-bottom: 120px; }

        /* AppBar */
        .app-bar { position: sticky; top: 0; z-index: 40; background: var(--glass-bg); backdrop-filter: blur(16px); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .app-title { font-size: 22px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        .app-title span { color: var(--primary); }
        .app-actions { display: flex; gap: 8px; }
        .nav-icon { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-main); width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: var(--shadow-card); flex-shrink: 0; padding: 0; }
        .nav-icon.accent { background: var(--primary); color: white; border-color: var(--primary); }
        .nav-icon:disabled { opacity: 0.15; cursor: default; }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        /* Bento Cards */
        .bento-grid { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
        .bento-card { background: var(--card-bg); border-radius: var(--radius-xl); padding: 20px; box-shadow: var(--shadow-card); border: 1px solid var(--border); overflow: hidden; }
        .bento-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
        .bento-value { font-size: 22px; font-weight: 800; color: var(--text-main); line-height: 1.2; }
        .bento-value.highlight { color: var(--primary); }
        .bento-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; font-weight: 500;}

        /* Navigation Layout for Cards */
        .card-header-nav { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; }
        .card-info-clickable { flex-grow: 1; text-align: center; cursor: pointer; }

        /* Expand Marker */
        .expand-marker { font-size: 10px; font-weight: 800; color: var(--primary); background: var(--primary-light); padding: 2px 8px; border-radius: 20px; margin-top: 8px; display: inline-flex; align-items: center; gap: 4px; transition: 0.3s; }
        .collapsed-content:not(.collapsed) ~ .expand-marker { opacity: 0; }

        /* Collapsible */
        .collapsible-content { 
            max-height: 800px; opacity: 1; transition: all 0.5s cubic-bezier(0, 1, 0, 1); 
            margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px;
        }
        .collapsible-content.collapsed { max-height: 0; opacity: 0; margin-top: 0; padding-top: 0; border-top: none; pointer-events: none; overflow: hidden; }

        /* Inputs */
        .bento-input { width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 15px; background-color: var(--input-bg); color: var(--text-main); font-family: inherit; font-weight: 600; transition: 0.2s; }
        .bento-input:focus { outline: none; border-color: var(--primary); background: var(--card-bg); }

        .in-stunden { 
            width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius-md); 
            font-size: 20px; font-weight: 800; text-align: center; color: var(--primary); 
            background: var(--input-bg); font-family: inherit; transition: 0.2s;
        }

        /* Entry Cards */
        .entry-card { background: var(--card-bg); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow-card); border: 1px solid var(--border); }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
        .time-row { display: grid; grid-template-columns: 1fr 56px; gap: 12px; align-items: center; margin-bottom: 16px; }
        
        .pill-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .pill-label { cursor: pointer; text-align: center; }
        .pill-label input { display: none; }
        .pill-text { 
            display: block; padding: 10px 2px; background: var(--pill-bg); color: var(--text-muted);
            border-radius: 10px; font-size: 10px; font-weight: 800; border: 1px solid transparent; transition: 0.2s; text-transform: uppercase;
        }
        .pill-label input:checked + .pill-text { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }

        /* FAB */
        .fab { position: fixed; bottom: 30px; right: 30px; z-index: 40; width: 64px; height: 64px; border-radius: 20px; background: var(--primary); color: white; border: none; font-size: 32px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-float); cursor: pointer; }

        /* Modals */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: var(--modal-overlay); backdrop-filter: blur(4px); }
        .sheet-content { background-color: var(--bg-color); position: absolute; bottom: 0; left: 0; width: 100%; border-radius: 32px 32px 0 0; padding: 30px 24px 40px 24px; max-height: 85vh; overflow-y: auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.15); }
        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .settings-block { background: var(--card-bg); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; border: 1px solid var(--border); }
        .btn-danger { width: 100%; background: var(--danger-bg); color: var(--danger); padding: 16px; border: none; border-radius: var(--radius-md); font-size: 16px; font-weight: 700; cursor: pointer; }
        
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }

        .creator-note { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 30px; font-weight: 600; }
    </style>
</head>
<body>

    <nav class="app-bar">
        <h1 class="app-title">Zeiten<span>.</span></h1>
        <div class="app-actions">
            <button class="nav-icon" onclick="openOverview()" title="Berichte">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"></path></svg>
            </button>
            <button class="nav-icon" onclick="openSettings()" title="Einstellungen">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
            <button class="nav-icon" onclick="generatePDF(true)" title="Teilen">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8.684 10.703a3 3 0 001.17 4.907l2.146.613a3 3 0 003.883-2.222l.613-2.146a3 3 0 00-2.222-3.883l-2.146-.613a3 3 0 00-3.883 2.222l-.613 2.146z"></path><path d="M15 13a3 3 0 10-6 0M12 21v-8m0-8V3"></path></svg>
            </button>
            <button class="nav-icon accent" onclick="generatePDF(false)" title="Download">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </button>
        </div>
    </nav>

    <div class="container">
        
        <div class="bento-grid">
            
            <div class="bento-card" id="weekCard">
                <div class="card-header-nav">
                    <button class="nav-icon" onclick="event.stopPropagation(); changeWeek(-1)">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
                    </button>

                    <div class="card-info-clickable" onclick="toggleWeekCollapse()">
                        <div class="bento-label">Wochen-Übersicht</div>
                        <div class="bento-value highlight" id="weekTitleDisplay">KW --</div>
                        <div class="bento-sub" id="weekDatesDisplay">--.--. - --.--.</div>
                        <div class="expand-marker" id="expandHint">Details <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg></div>
                    </div>

                    <button class="nav-icon" onclick="event.stopPropagation(); changeWeek(1)">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>

                <div class="collapsible-content collapsed" id="weekContent">
                    <div style="display: flex; justify-content: space-between; align-items: center; background: var(--input-bg); padding: 16px; border-radius: var(--radius-md); border: 1px solid var(--border); margin-bottom: 16px;">
                        <div>
                            <div class="bento-label" style="margin-bottom: 4px;">Gesamtstunden</div>
                            <div class="bento-value" id="totalWeek">0.00</div>
                        </div>
                        <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 6px;">
                            <span class="bento-sub" style="margin: 0; font-weight: 600;">Sperren</span>
                            <label class="switch">
                                <input type="checkbox" id="chkSubmitted" onchange="toggleSubmitted()">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <div>
                        <div class="bento-label">Bereitschaftsdienst</div>
                        <input type="text" id="in-bereitschaft" class="bento-input" placeholder="Zeitraum eintragen..." oninput="saveBereitschaft()">
                    </div>
                </div>
            </div>

            <div class="bento-card">
                <div class="card-header-nav">
                    <button class="nav-icon" id="prevDayBtn" onclick="changeDay(-1)">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
                    </button>

                    <div class="card-info-clickable">
                        <div class="bento-label">Aktueller Tag</div>
                        <div class="bento-value" id="dayTitleDisplay">Montag, 01.01.</div>
                        <div class="bento-sub">Tagessumme: <strong style="color:var(--primary);" id="dailyTotal">0.00</strong> h</div>
                    </div>

                    <button class="nav-icon" id="nextDayBtn" onclick="changeDay(1)">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>
            
        </div>

        <div class="entries-header" style="font-weight: 800; font-size: 18px; margin-bottom: 12px; padding-left: 4px;">Einträge</div>
        <div id="entryList"></div>

    </div>

    <button class="fab" id="addEntryBtn" onclick="addEmptyCard()">
        <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
    </button>

    <div id="settingsModal" class="modal">
        <div class="sheet-content">
            <div class="sheet-header">
                <h2 style="margin:0; font-weight:800;">Einstellungen</h2>
                <button class="nav-icon" onclick="closeSettings()" style="width:36px; height:36px;">✕</button>
            </div>
            <div class="settings-block">
                <label class="bento-label">Dein Name (PDF)</label>
                <input type="text" id="userName" class="bento-input" placeholder="Vorname Nachname">
            </div>
            <div class="settings-block">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:700;">Dunkelmodus</span>
                    <label class="switch">
                        <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="settings-block" style="border-color: var(--danger-bg);">
                <label class="bento-label" style="color: var(--danger);">Alle Inhalte Löschen</label>
                <p style="font-size: 13px; color: var(--text-muted); margin: 0 0 12px 0;">Hiermit entfernst du alle gespeicherten Zeiten permanent.</p>
                <button class="btn-danger" onclick="resetAllData()">Daten jetzt löschen</button>
            </div>
            <p class="creator-note">Erstellt von <strong>F.Theis</strong></p>
        </div>
    </div>

    <div id="overviewModal" class="modal">
        <div class="sheet-content">
            <div class="sheet-header">
                <h2 style="margin:0; font-weight:800;">Berichte</h2>
                <button class="nav-icon" onclick="closeOverview()" style="width:36px; height:36px;">✕</button>
            </div>
            <div id="overviewList"></div>
        </div>
    </div>

    <script>
        const dayNames = ['Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag', 'Sonntag'];
        let appState = { mondayDate: null, dayIndex: 0, name: '', entries: {}, submittedWeeks: {}, weeklyBereitschaft: {}, theme: 'dark' };

        function getMonday(d) {
            let date = new Date(d); date.setHours(0,0,0,0);
            let day = date.getDay(); let diff = date.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(date.setDate(diff));
        }
        function getDateForIndex(index, monday = appState.mondayDate) {
            let d = new Date(monday); d.setDate(d.getDate() + index); return d;
        }
        function getDateString(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }
        function formatDateShort(date) {
            return `${String(date.getDate()).padStart(2, '0')}.${String(date.getMonth() + 1).padStart(2, '0')}.${date.getFullYear()}`;
        }
        function formatDateVeryShort(date) {
            return `${String(date.getDate()).padStart(2, '0')}.${String(date.getMonth() + 1).padStart(2, '0')}.`;
        }
        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
        }

        function toggleWeekCollapse() {
            const content = document.getElementById('weekContent');
            const hint = document.getElementById('expandHint');
            content.classList.toggle('collapsed');
            hint.style.display = content.classList.contains('collapsed') ? 'inline-flex' : 'none';
        }

        function initApp() {
            appState.mondayDate = getMonday(new Date());
            let today = new Date();
            appState.dayIndex = today.getDay() === 0 ? 6 : today.getDay() - 1;
            loadFromStorage();
            applyTheme();
            renderApp();
            document.getElementById('entryList').addEventListener('input', () => { saveCurrentDay(); updateTotals(); });
            window.onclick = function(event) {
                if (event.target == document.getElementById('overviewModal')) closeOverview();
                if (event.target == document.getElementById('settingsModal')) closeSettings();
            }
        }

        function applyTheme() {
            document.documentElement.setAttribute('data-theme', appState.theme);
            document.getElementById('themeToggle').checked = (appState.theme === 'dark');
        }
        function toggleTheme() {
            appState.theme = document.getElementById('themeToggle').checked ? 'dark' : 'light';
            applyTheme(); saveToStorage();
        }

        function renderApp() {
            let sunday = new Date(appState.mondayDate); sunday.setDate(sunday.getDate() + 6);
            let mondayStr = getDateString(appState.mondayDate);
            document.getElementById('weekTitleDisplay').innerText = `KW ${getWeekNumber(appState.mondayDate)}`;
            document.getElementById('weekDatesDisplay').innerText = `${formatDateVeryShort(appState.mondayDate)} – ${formatDateVeryShort(sunday)}`;
            let isLocked = !!appState.submittedWeeks[mondayStr];
            document.getElementById('chkSubmitted').checked = isLocked;
            document.getElementById('userName').value = appState.name;
            document.getElementById('in-bereitschaft').value = appState.weeklyBereitschaft[mondayStr] || '';
            document.getElementById('in-bereitschaft').disabled = isLocked;
            let currentDate = getDateForIndex(appState.dayIndex);
            document.getElementById('dayTitleDisplay').innerText = `${dayNames[appState.dayIndex]}, ${formatDateVeryShort(currentDate)}`;
            document.getElementById('prevDayBtn').disabled = appState.dayIndex === 0;
            document.getElementById('nextDayBtn').disabled = appState.dayIndex === 6;
            document.getElementById('addEntryBtn').style.display = isLocked ? 'none' : 'flex';
            let dateStr = getDateString(currentDate);
            let dayData = appState.entries[dateStr] || [];
            const list = document.getElementById('entryList');
            list.innerHTML = ''; 
            if (dayData.length === 0) addEmptyCard(isLocked); 
            else dayData.forEach(entry => addCardToDOM(entry.baustelle, entry.arbeit, entry.stunden, entry.zusatz, isLocked));
            updateTotals();
        }

        function addEmptyCard(isLocked = false) { addCardToDOM('', '', '', [], isLocked); }

        function addCardToDOM(baustelle, arbeit, stunden, zusatz, isLocked) {
            const list = document.getElementById('entryList');
            const card = document.createElement('div');
            card.className = 'entry-card';
            let zList = Array.isArray(zusatz) ? zusatz : [];
            const dAttr = isLocked ? 'disabled' : '';
            card.innerHTML = `
                <div class="input-group">
                    <input type="text" class="in-baustelle bento-input" placeholder="Projekt / Ort" value="${baustelle}" ${dAttr}>
                    <input type="text" class="in-arbeit bento-input" placeholder="Tätigkeiten" value="${arbeit}" ${dAttr}>
                </div>
                <div class="time-row">
                    <input type="number" step="0.25" class="in-stunden" placeholder="0.00" value="${stunden}" ${dAttr}>
                    <button class="nav-icon" style="height:100%; width:100%; color:var(--danger); background:var(--danger-bg); border:none; border-radius:12px;" onclick="deleteCard(this)" ${dAttr}>
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
                <div class="pill-container">
                    <label class="pill-label"><input type="checkbox" value="Auslöse" class="in-zusatz" ${zList.includes('Auslöse')?'checked':''} ${dAttr}><span class="pill-text">Auslöse</span></label>
                    <label class="pill-label"><input type="checkbox" value="Übernacht." class="in-zusatz" ${zList.includes('Übernacht.')?'checked':''} ${dAttr}><span class="pill-text">Übernacht.</span></label>
                    <label class="pill-label"><input type="checkbox" value="Notdienst" class="in-zusatz" ${zList.includes('Notdienst')?'checked':''} ${dAttr}><span class="pill-text">Notdienst</span></label>
                </div>
            `;
            list.appendChild(card);
        }

        function deleteCard(btn) { btn.closest('.entry-card').remove(); saveCurrentDay(); updateTotals(); if(document.getElementById('entryList').children.length === 0) addEmptyCard(); }
        function saveBereitschaft() { appState.weeklyBereitschaft[getDateString(appState.mondayDate)] = document.getElementById('in-bereitschaft').value; saveToStorage(); }
        function changeDay(delta) { saveCurrentDay(); appState.dayIndex += delta; renderApp(); }
        function changeWeek(delta) { saveCurrentDay(); appState.mondayDate.setDate(appState.mondayDate.getDate() + (delta * 7)); appState.dayIndex = 0; renderApp(); }
        
        function toggleSubmitted() {
            let checkbox = document.getElementById('chkSubmitted');
            let mStr = getDateString(appState.mondayDate);
            if (!checkbox.checked && !confirm("Diese Woche wirklich entsperren?")) { checkbox.checked = true; return; }
            appState.submittedWeeks[mStr] = checkbox.checked;
            saveToStorage(); renderApp(); 
        }

        function openSettings() { document.getElementById('settingsModal').style.display = 'block'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
        function openOverview() {
            saveCurrentDay();
            const list = document.getElementById('overviewList');
            list.innerHTML = '';
            let weeksMap = new Map();
            for (const [dateStr, entries] of Object.entries(appState.entries)) {
                let monday = getMonday(new Date(dateStr));
                let mStr = getDateString(monday);
                if (!weeksMap.has(mStr)) weeksMap.set(mStr, { date: monday, hours: 0 });
                entries.forEach(e => weeksMap.get(mStr).hours += parseFloat(e.stunden) || 0);
            }
            Array.from(weeksMap.values()).sort((a,b)=>b.date-a.date).forEach(w => {
                let div = document.createElement('div');
                div.style = "padding:16px; background:var(--card-bg); border:1px solid var(--border); border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;";
                div.innerHTML = `<div><strong>KW ${getWeekNumber(w.date)}</strong><br><small>${formatDateVeryShort(w.date)}</small></div><div style="font-weight:800; color:var(--primary);">${w.hours.toFixed(2)} h</div>`;
                div.onclick = () => { appState.mondayDate = w.date; appState.dayIndex = 0; renderApp(); closeOverview(); };
                list.appendChild(div);
            });
            document.getElementById('overviewModal').style.display = 'block';
        }
        function closeOverview() { document.getElementById('overviewModal').style.display = 'none'; }

        function saveCurrentDay() {
            let entries = [];
            document.querySelectorAll('.entry-card').forEach(card => {
                entries.push({
                    baustelle: card.querySelector('.in-baustelle').value,
                    arbeit: card.querySelector('.in-arbeit').value,
                    stunden: card.querySelector('.in-stunden').value,
                    zusatz: Array.from(card.querySelectorAll('.in-zusatz:checked')).map(cb => cb.value)
                });
            });
            appState.entries[getDateString(getDateForIndex(appState.dayIndex))] = entries;
            saveToStorage();
        }

        function updateTotals() {
            let dTot = 0; document.querySelectorAll('.in-stunden').forEach(i => dTot += parseFloat(i.value) || 0);
            document.getElementById('dailyTotal').innerText = dTot.toFixed(2);
            let wTot = 0; for(let i=0; i<7; i++) {
                let data = appState.entries[getDateString(getDateForIndex(i))] || [];
                data.forEach(e => wTot += parseFloat(e.stunden) || 0);
            }
            document.getElementById('totalWeek').innerText = wTot.toFixed(2);
        }

        function saveToStorage() { localStorage.setItem('wochenstunden_pro', JSON.stringify(appState)); }
        function loadFromStorage() {
            let saved = localStorage.getItem('wochenstunden_pro');
            if (saved) {
                let p = JSON.parse(saved);
                appState.name = p.name || '';
                appState.entries = p.entries || {};
                appState.submittedWeeks = p.submittedWeeks || {};
                appState.weeklyBereitschaft = p.weeklyBereitschaft || {};
                appState.theme = p.theme || 'dark';
            }
        }

        function resetAllData() {
            if (confirm("Wirklich ALLE Daten löschen?")) {
                localStorage.clear(); location.reload();
            }
        }

        async function generatePDF(shouldShare = false) {
            saveCurrentDay();
            let total = 0, cA = 0, cU = 0, cN = 0;
            let kw = getWeekNumber(appState.mondayDate);
            let bTxt = appState.weeklyBereitschaft[getDateString(appState.mondayDate)] || '';
            let fileName = `Stundenzettel_KW${kw}_${(appState.name||'Mitarbeiter').replace(/\s+/g, '_')}.pdf`;

            let html = `<div style="font-family:'Outfit',sans-serif; padding:40px; color:#0f172a; min-height: 280mm; display: flex; flex-direction: column;">
                <div style="display:flex; justify-content:space-between; border-bottom:2px solid #f1f5f9; padding-bottom:20px; margin-bottom:30px;">
                    <h1 style="font-size:36px; margin:0; font-weight:800;">Stundenzettel<span style="color:#0ea5e9;">.</span></h1>
                    <div style="text-align:right;"><strong>Kalenderwoche ${kw}</strong><br>${formatDateShort(appState.mondayDate)} - ${formatDateShort(getDateForIndex(6))}</div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:30px;">
                    <div style="background:#f8fafc; padding:15px; border-radius:12px; border:1px solid #e2e8f0;"><small style="color:#64748b; text-transform:uppercase; font-weight:700;">Mitarbeiter</small><br><strong style="font-size:16px;">${appState.name || '-'}</strong></div>
                    <div style="background:#f8fafc; padding:15px; border-radius:12px; border:1px solid #e2e8f0;"><small style="color:#64748b; text-transform:uppercase; font-weight:700;">Bereitschaft</small><br><strong style="font-size:16px;">${bTxt || '-'}</strong></div>
                </div>
                <table style="width:100%; border-collapse:collapse; font-size:12px; flex-grow: 1;">
                    <tr style="background:#f1f5f9;"><th style="padding:12px; text-align:left;">Tag</th><th style="padding:12px; text-align:left;">Projekt</th><th style="padding:12px; text-align:left;">Tätigkeit</th><th style="padding:12px; text-align:center;">Std.</th><th style="padding:12px; text-align:left;">Extras</th></tr>`;
            
            for(let i=0; i<7; i++) {
                let dayEntries = appState.entries[getDateString(getDateForIndex(i))] || [];
                dayEntries.filter(e => parseFloat(e.stunden) > 0 || e.baustelle).forEach((e, idx) => {
                    let s = parseFloat(e.stunden) || 0; total += s;
                    if(e.zusatz.includes('Auslöse')) cA++; if(e.zusatz.includes('Übernacht.')) cU++; if(e.zusatz.includes('Notdienst')) cN++;
                    html += `<tr style="border-bottom:1px solid #f1f5f9;"><td style="padding:12px;">${idx===0?`<strong>${dayNames[i]}</strong>`:''}</td><td style="padding:12px; color:#0ea5e9; font-weight:700;">${e.baustelle}</td><td style="padding:12px;">${e.arbeit}</td><td style="padding:12px; text-align:center; font-weight:800; font-size:14px;">${s.toFixed(2)}</td><td style="padding:12px;">${e.zusatz.join(', ')}</td></tr>`;
                });
            }
            html += `</table>
                <div style="margin-top:auto; padding-top:40px; display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; gap:10px;">
                        <div style="background:#f8fafc; padding:10px; border-radius:8px; border:1px solid #e2e8f0; text-align:center; min-width:80px;"><small style="font-size:9px; color:#64748b; font-weight:800;">AUSLÖSE</small><br><strong>${cA}x</strong></div>
                        <div style="background:#f8fafc; padding:10px; border-radius:8px; border:1px solid #e2e8f0; text-align:center; min-width:80px;"><small style="font-size:9px; color:#64748b; font-weight:800;">ÜBERNACHT.</small><br><strong>${cU}x</strong></div>
                        <div style="background:#f8fafc; padding:10px; border-radius:8px; border:1px solid #e2e8f0; text-align:center; min-width:80px;"><small style="font-size:9px; color:#64748b; font-weight:800;">NOTDIENST</small><br><strong>${cN}x</strong></div>
                    </div>
                    <div style="background:#0f172a; color:white; padding:15px 30px; border-radius:15px; text-align:right;">
                        <small style="opacity:0.7; font-weight:700;">GESAMTWOCHE</small><br>
                        <strong style="font-size:32px; color:#0ea5e9;">${total.toFixed(2)} h</strong>
                    </div>
                </div>
            </div>`;

            const worker = html2pdf().set({ margin:0, filename:fileName, html2canvas:{scale:3}, jsPDF:{unit:'mm', format:'a4'} }).from(html);

            if (shouldShare && navigator.canShare && navigator.share) {
                const pdfBlob = await worker.output('blob');
                const file = new File([pdfBlob], fileName, { type: 'application/pdf' });
                try {
                    await navigator.share({ files: [file], title: 'Stundenzettel', text: `Mein Stundenzettel KW ${kw}` });
                } catch (err) {
                    worker.save();
                }
            } else {
                worker.save();
            }
        }

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
